name: Publish Docker image (GHCR)

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

concurrency:
  group: docker-image-ghcr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare Docker tags
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    permissions:
      contents: read
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Resolve Docker tags
        id: version
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            VERSION="$GITHUB_REF_NAME"
          else
            VERSION="main-$(date +'%Y%m%d')-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Prepared Docker tags: $VERSION"

  build_single_arch:
    name: Build & push (${{ matrix.arch }}) [native]
    needs: [prepare]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Write VERSION
        run: |
          echo "${{ needs.prepare.outputs.version }}" > VERSION
          echo "Publishing version: ${{ needs.prepare.outputs.version }} for ${{ matrix.arch }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (labels)
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/0xbb2b/new-api

      - name: Build & push single-arch
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ghcr.io/0xbb2b/new-api:${{ needs.prepare.outputs.version }}-${{ matrix.arch }}
            ${{ github.ref_type == 'branch' && format('ghcr.io/0xbb2b/new-api:latest-{0}', matrix.arch) || '' }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Output digest
        run: |
          echo "### Docker Image Digest (${{ matrix.arch }})" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "ghcr.io/0xbb2b/new-api:${{ needs.prepare.outputs.version }}-${{ matrix.arch }}" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  create_manifests:
    name: Create multi-arch manifests
    needs: [prepare, build_single_arch]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create & push manifest (latest)
        if: github.ref_type == 'branch'
        run: |
          docker buildx imagetools create \
            -t ghcr.io/0xbb2b/new-api:latest \
            ghcr.io/0xbb2b/new-api:latest-amd64 \
            ghcr.io/0xbb2b/new-api:latest-arm64

      - name: Create & push manifest (versioned)
        run: |
          docker buildx imagetools create \
            -t ghcr.io/0xbb2b/new-api:${{ needs.prepare.outputs.version }} \
            ghcr.io/0xbb2b/new-api:${{ needs.prepare.outputs.version }}-amd64 \
            ghcr.io/0xbb2b/new-api:${{ needs.prepare.outputs.version }}-arm64

      - name: Output manifest digest
        run: |
          echo "### Multi-arch Manifest Digest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          docker buildx imagetools inspect ghcr.io/0xbb2b/new-api:${{ needs.prepare.outputs.version }} >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
